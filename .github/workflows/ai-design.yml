name: ai-design

on:
  issues:
    types:
      - labeled

jobs:
  ai-design:
    if: github.event.label.name == 'ai-design'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      ISSUE_NUMBER: ${{ github.event.issue.number }}
      REPO: ${{ github.repository }}
      BRANCH_NAME: feature/${{ github.event.issue.number }}
      CUSTOM_AGENT: ai-design
      CUSTOM_INSTRUCTIONS: You are in the design phase. The issue number is ${{ github.event.issue.number }}. Your only output is docs/tasks/<issue-number>/task.md. Only do technical design — do not implement anything, do not modify any files outside docs/tasks/<issue-number>/task.md, do not add tests, do not change configs or workflows. Stop immediately after writing docs/tasks/<issue-number>/task.md.

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Print issue context
        run: |
          echo "Workflow: ai-design"
          echo "Action: ${{ github.event.action }}"
          echo "Issue number: $ISSUE_NUMBER"
          echo "Issue title: ${{ github.event.issue.title }}"
          echo "Added label: ${{ github.event.label.name }}"
          echo "Issue URL: ${{ github.event.issue.html_url }}"

      - name: Create feature branch
        run: |
          python scripts/create_branch.py "$BRANCH_NAME" --repo "$REPO"

      - name: Assign issue to Copilot
        env:
          GITHUB_TOKEN: ${{ secrets.COPILOT_ACTION_TOKEN }}
        run: |
          if [ -z "$GITHUB_TOKEN" ]; then
            echo "COPILOT_ACTION_TOKEN secret is required for Copilot issue assignment" >&2
            exit 1
          fi
          python scripts/assign_to_copilot.py "$ISSUE_NUMBER" \
            --repo "$REPO" \
            --branch "$BRANCH_NAME" \
            --instructions "$CUSTOM_INSTRUCTIONS" \
            --custom-agent "$CUSTOM_AGENT" \
            --model "gpt-5.4"

      - name: Comment issue start
        env:
          COMMENT_BODY: |
            🚀 **Stage: Design** has started!

            📋 Copilot is analyzing the issue and creating a technical design document.

            🤖 Model : gpt-5.4
        run: |
          python scripts/comment_on_issue.py "$ISSUE_NUMBER" "$COMMENT_BODY" --repo "$REPO"